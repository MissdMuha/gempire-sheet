<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Gempire - Мастер-Пульт</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #2b2b2b;
            color: #fbf6ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { border-bottom: 2px solid #635a55; padding-bottom: 10px; font-family: 'Georgia', serif; }

        .admin-container {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            background: #38332f;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            align-items: flex-start;
        }

        /* Стили формы */
        .form-section { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; text-transform: uppercase; font-weight: bold; color: #dcd3cb; letter-spacing: 1px;}
        input, select, textarea {
            background: #2b2b2b;
            border: 1px solid #635a55;
            color: #fbf6ec;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Segoe UI', sans-serif;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: #dcd3cb; }
        textarea { resize: vertical; min-height: 100px; }

        .btn-submit {
            background-color: #635a55;
            color: #fbf6ec;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: #7a706a; }

        /* Предпросмотр карточки (копия стилей из листа) */
        .preview-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .card {
            background-color: #fbf6ec; width: 63.5mm; height: 88.9mm;
            border: 1px solid rgba(69, 63, 60, 0.1); border-radius: 8px;
            display: flex; padding: 2.2mm; box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            color: #2c2825;
        }
        .card-frame { flex-grow: 1; border: 2px solid #453f3c; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .card-header { background-color: #635a55; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #453f3c; height: 48px; }
        .card-title-box { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .card-label-display { font-size: 9px; text-transform: uppercase; font-weight: bold; color: #dcd3cb; }
        .card-title-display { font-family: 'Constantia', 'Georgia', serif; font-size: 15px; font-weight: bold; color: #fbf6ec; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tag-box { width: 30px; height: 30px; background-color: #fbf6ec; border: 1px solid #453f3c; border-radius: 5px; display: flex; align-items: center; justify-content: center; box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.3); }
        .card-tag-display { font-size: 16px; font-family: 'Constantia', 'Georgia', serif; font-weight: bold; color: #2c2825; }
        .card-body { flex-grow: 1; padding: 0 10px; display: flex; flex-direction: column; }
        .flesh-theme { background-color: #f7e6ea; } .will-theme { background-color: #efe3fa; } .method-theme { background-color: #e3f0fa; }
        .card-rich-text {
            width: 100%; height: 100%; font-family: 'Constantia', 'Cambria', 'Georgia', serif;
            font-size: 14px; white-space: pre-wrap; word-wrap: break-word;
            --lh: 24px; line-height: var(--lh);
            background-image: repeating-linear-gradient(transparent, transparent calc(var(--lh) - 1px), rgba(69, 63, 60, 0.15) calc(var(--lh) - 1px), rgba(69, 63, 60, 0.15) var(--lh));
        }
        .card-footer { border-top: 1px dashed rgba(69, 63, 60, 0.25); padding: 3px 10px 5px 10px; display: flex; flex-direction: column; justify-content: center; height: 36px; background-color: rgba(255, 255, 255, 0.1); }
        .footer-label { font-size: 7px; font-weight: 800; color: #8a807a; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 1px; }
        .card-footer-tags-display { font-family: 'Segoe UI', sans-serif; font-size: 11px; font-weight: bold; color: #453f3c; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Список существующих карточек */
        .cards-list-container { width: 100%; max-width: 1000px; }
        .cards-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: flex-start; }
        .mini-card-wrapper { display: flex; flex-direction: column; gap: 10px; align-items: center; background: #38332f; padding: 10px; border-radius: 10px; }
        .owner-badge { background: #635a55; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .btn-delete { background-color: #d4a3ae; color: #2b2b2b; border: none; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-delete:hover { background-color: #c78b98; }
    </style>
</head>
<body>

    <h1>Мастер-Пульт: Выдача карточек</h1>

    <div class="admin-container">
        <form class="form-section" id="add-card-form">
            <div class="form-group">
                <label>ID Персонажа (Кому выдать)</label>
                <input type="text" id="input_owner_id" placeholder="Например: 1 или 404-elf" required>
            </div>
            <div class="form-group">
                <label>Тема (Цвет)</label>
                <select id="input_theme">
                    <option value="flesh-theme">Плоть (Розовый)</option>
                    <option value="will-theme">Воля (Фиолетовый)</option>
                    <option value="method-theme">Метод (Синий)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Тип (Надзаголовок)</label>
                <input type="text" id="input_label" value="НАВЫК" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Название способности</label>
                <input type="text" id="input_title" placeholder="Например: Тяжелый удар" required oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Метка (Правый квадрат)</label>
                <input type="text" id="input_tag" placeholder="I, 2ОВ, 5+" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Описание (Механика)</label>
                <textarea id="input_description" placeholder="Используйте <b>текст</b> для жирного шрифта..." oninput="updatePreview()"></textarea>
            </div>
            <div class="form-group">
                <label>Тэги в подвале</label>
                <input type="text" id="input_footer" placeholder="Оружие, Контакт, Сила" oninput="updatePreview()">
            </div>
            
            <button type="submit" class="btn-submit">Выдать карточку</button>
            <div id="status-msg" style="color: #a5c6df; font-weight: bold; text-align: center; height: 20px;"></div>
        </form>

        <div class="preview-section">
            <label>Предпросмотр карточки</label>
            <div class="card">
                <div class="card-frame">
                    <div class="card-header">
                        <div class="card-title-box">
                            <div class="card-label-display" id="prev_label">НАВЫК</div>
                            <div class="card-title-display" id="prev_title">Название</div>
                        </div>
                        <div class="card-tag-box"><div class="card-tag-display" id="prev_tag"></div></div>
                    </div>
                    <div class="card-body flesh-theme" id="prev_theme">
                        <div class="card-rich-text" id="prev_desc"></div>
                    </div>
                    <div class="card-footer" id="prev_footer_theme">
                        <div class="footer-label">ТЭГИ</div>
                        <div class="card-footer-tags-display" id="prev_footer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="cards-list-container">
        <h1>Выданные карточки</h1>
        <div class="cards-grid" id="existing-cards-grid">
            </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://fzfijdsjgxoympldpwyq.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6ZmlqZHNqZ3hveW1wbGRwd3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDY2NzAsImV4cCI6MjA5NDcyMjY3MH0.iAADzjFKSLEr1DHdQPq3j4Ji6tdh-NZhrTfIsvdxUgA'; 
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Обновление предпросмотра
        window.updatePreview = function() {
            document.getElementById('prev_label').innerText = document.getElementById('input_label').value || 'НАВЫК';
            document.getElementById('prev_title').innerText = document.getElementById('input_title').value || 'Без названия';
            document.getElementById('prev_tag').innerText = document.getElementById('input_tag').value;
            document.getElementById('prev_desc').innerHTML = document.getElementById('input_description').value.replace(/\n/g, '<br>');
            document.getElementById('prev_footer').innerText = document.getElementById('input_footer').value;
            
            const theme = document.getElementById('input_theme').value;
            const body = document.getElementById('prev_theme');
            body.className = `card-body ${theme}`;
        };
        
        document.getElementById('input_theme').addEventListener('change', window.updatePreview);

        // Функция загрузки всех карточек
        async function fetchCards() {
            const { data: cards, error } = await supabase.from('cards').select('*').order('owner_id');
            const grid = document.getElementById('existing-cards-grid');
            grid.innerHTML = '';

            if (error) {
                grid.innerHTML = `<p>Ошибка загрузки: ${error.message}</p>`;
                return;
            }

            cards.forEach(card => {
                const html = `
                    <div class="mini-card-wrapper">
                        <div class="owner-badge">ID: ${card.owner_id}</div>
                        <div class="card">
                            <div class="card-frame">
                                <div class="card-header">
                                    <div class="card-title-box">
                                        <div class="card-label-display">${card.card_label || ''}</div>
                                        <div class="card-title-display">${card.card_title || ''}</div>
                                    </div>
                                    <div class="card-tag-box"><div class="card-tag-display">${card.card_tag || ''}</div></div>
                                </div>
                                <div class="card-body ${card.theme || ''}">
                                    <div class="card-rich-text">${card.card_description || ''}</div>
                                </div>
                                <div class="card-footer">
                                    <div class="footer-label">ТЭГИ</div>
                                    <div class="card-footer-tags-display">${card.card_footer_tags || ''}</div>
                                </div>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="deleteCard('${card.id}')">Удалить карточку</button>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });
        }

        // Отправка формы (Добавление карточки)
        document.getElementById('add-card-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusMsg = document.getElementById('status-msg');
            statusMsg.innerText = 'Отправка...';

            const newCard = {
                owner_id: document.getElementById('input_owner_id').value,
                theme: document.getElementById('input_theme').value,
                card_label: document.getElementById('input_label').value,
                card_title: document.getElementById('input_title').value,
                card_tag: document.getElementById('input_tag').value,
                card_description: document.getElementById('input_description').value,
                card_footer_tags: document.getElementById('input_footer').value
            };

            const { error } = await supabase.from('cards').insert([newCard]);

            if (error) {
                statusMsg.style.color = '#d4a3ae';
                statusMsg.innerText = `Ошибка: ${error.message}`;
            } else {
                statusMsg.style.color = '#a5c6df';
                statusMsg.innerText = 'Успешно выдано!';
                setTimeout(() => statusMsg.innerText = '', 3000);
                
                // Очищаем форму, оставляем только ID для удобства выдачи серии карточек
                document.getElementById('input_title').value = '';
                document.getElementById('input_tag').value = '';
                document.getElementById('input_description').value = '';
                document.getElementById('input_footer').value = '';
                window.updatePreview();
                fetchCards(); // Обновляем список
            }
        });

        // Функция удаления карточки (доступна глобально через window)
        window.deleteCard = async function(cardId) {
            if(confirm('Точно удалить эту карточку у игрока?')) {
                await supabase.from('cards').delete().eq('id', cardId);
                fetchCards();
            }
        };

        // Инициализация
        fetchCards();
        window.updatePreview();
    </script>
</body>
</html>
