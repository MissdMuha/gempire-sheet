<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Gempire - Мастер-Пульт</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #2b2b2b;
            color: #fbf6ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { border-bottom: 2px solid #635a55; padding-bottom: 10px; font-family: 'Georgia', serif; text-align: center; }

        .admin-container {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            background: #38332f;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
            align-items: flex-start;
        }

        /* Стили формы */
        .form-section { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; text-transform: uppercase; font-weight: bold; color: #dcd3cb; letter-spacing: 1px;}
        input, select, textarea {
            background: #2b2b2b;
            border: 1px solid #635a55;
            color: #fbf6ec;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Segoe UI', sans-serif;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: #dcd3cb; }
        textarea { resize: vertical; min-height: 120px; }

        .btn-submit {
            background-color: #635a55;
            color: #fbf6ec;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: #7a706a; }

        /* Плашка режима редактирования */
        .edit-banner {
            background: #4a443f;
            border: 1px solid #c8b88f;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            color: #fbf6ec;
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .edit-banner.active { display: flex; }
        .edit-banner b { color: #c8b88f; }
        .btn-cancel-edit {
            background: #7a706a; color: #fbf6ec; border: none;
            padding: 9px; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .btn-cancel-edit:hover { background: #8d827b; }

        /* Идентичные стили для карточек (Предпросмотр + Список) */
        .preview-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .card {
            background-color: #fbf6ec; width: 63.5mm; height: 88.9mm;
            border: 1px solid rgba(69, 63, 60, 0.1); border-radius: 8px;
            display: flex; padding: 2.2mm; box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            color: #2c2825; flex-shrink: 0;
        }
        .card-frame { flex-grow: 1; border: 2px solid #453f3c; border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; position: relative;}
        .card-header { background-color: #635a55; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #453f3c; height: 48px; flex-shrink: 0;}
        .card-title-box { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; justify-content: center;}
        .card-label-display { font-size: 9px; text-transform: uppercase; font-weight: bold; color: #dcd3cb; letter-spacing: 0.5px;}
        .card-title-display { font-family: 'Constantia', 'Georgia', serif; font-size: 15px; font-weight: bold; color: #fbf6ec; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tag-box { width: 30px; height: 30px; background-color: #fbf6ec; border: 1px solid #453f3c; border-radius: 5px; display: flex; align-items: center; justify-content: center; box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.3); flex-shrink: 0;}
        .card-tag-display { font-size: 16px; font-family: 'Constantia', 'Georgia', serif; font-weight: bold; color: #2c2825; transform: translateY(0.5px);}
        
        .card-body { flex-grow: 1; position: relative; padding: 0 10px; overflow: hidden; display: flex; flex-direction: column; }
        
        .flesh-theme { background-color: #f7e6ea; } 
        .will-theme { background-color: #efe3fa; } 
        .method-theme { background-color: #e3f0fa; }
        
        .card-rich-text {
            width: 100%; height: 100%; background: transparent;
            font-family: 'Constantia', 'Cambria', 'Georgia', serif; font-size: 14px; font-weight: 400; color: #2c2825;
            padding: 0; overflow: hidden; white-space: pre-wrap; word-wrap: break-word;
            --lh: 24px; line-height: var(--lh);
            background-image: repeating-linear-gradient(transparent, transparent calc(var(--lh) - 1px), rgba(69, 63, 60, 0.15) calc(var(--lh) - 1px), rgba(69, 63, 60, 0.15) var(--lh));
            background-attachment: local;
        }
        .card-rich-text b, .card-rich-text strong { font-weight: 800; color: #000; }
        
        .card-footer { border-top: 1px dashed rgba(69, 63, 60, 0.25); padding: 3px 10px 5px 10px; display: flex; flex-direction: column; justify-content: center; height: 36px; background-color: rgba(255, 255, 255, 0.1); flex-shrink: 0;}
        .footer-label { font-size: 7px; font-weight: 800; color: #8a807a; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 1px; }
        .card-footer-tags-display { font-family: 'Segoe UI', sans-serif; font-size: 11px; font-weight: bold; color: #453f3c; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        /* Список существующих карточек */
        .cards-list-container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center;}
        .cards-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%;}
        .mini-card-wrapper { display: flex; flex-direction: column; gap: 10px; align-items: center; background: #38332f; padding: 12px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: calc(63.5mm + 24px); }
        .mini-card-wrapper.is-editing { outline: 2px solid #c8b88f; }

        /* Владельцы (чипы) */
        .owners-block { width: 100%; display: flex; flex-direction: column; gap: 6px; }
        .owners-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #dcd3cb; font-weight: bold; display: flex; justify-content: space-between; }
        .copies-count { color: #a5c6df; }
        .owners-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .owner-chip {
            background: #635a55; padding: 3px 5px 3px 9px; border-radius: 4px;
            font-size: 12px; font-weight: bold; color: #fbf6ec;
            display: flex; align-items: center; gap: 6px;
        }
        .owner-chip button {
            background: transparent; border: none; color: #dcd3cb;
            cursor: pointer; font-size: 15px; line-height: 1; padding: 0 2px;
        }
        .owner-chip button:hover { color: #fff; }

        .add-owner-row { display: flex; gap: 6px; width: 100%; }
        .add-owner-row input { flex: 1; padding: 7px 8px; font-size: 12px; }
        .add-owner-row button {
            background-color: #635a55; color: #fbf6ec; border: none;
            padding: 0 12px; border-radius: 5px; font-weight: bold; cursor: pointer; white-space: nowrap;
        }
        .add-owner-row button:hover { background-color: #7a706a; }
        
        /* Кнопки управления карточкой */
        .card-controls { display: flex; flex-direction: column; gap: 6px; width: 100%; margin-top: 2px; }
        .btn-edit { background-color: #c8b88f; color: #2b2b2b; border: none; padding: 7px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-edit:hover { background-color: #b9a878; }
        .btn-copy { background-color: #a5c6df; color: #2b2b2b; border: none; padding: 7px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-copy:hover { background-color: #8db5d2; }
        .btn-delete { background-color: #d4a3ae; color: #2b2b2b; border: none; padding: 7px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-delete:hover { background-color: #c78b98; }

        .card-link { color: #4a76a8; text-decoration: underline; text-decoration-style: dashed; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Мастер-Пульт: Выдача карточек</h1>

    <div class="admin-container">
        <form class="form-section" id="add-card-form">
            <div class="edit-banner" id="edit-banner">
                <span id="edit-banner-text"></span>
                <button type="button" class="btn-cancel-edit" onclick="cancelEdit()">Отменить редактирование</button>
            </div>

            <div class="form-group" id="owner-field-group">
                <label>ID Игрока (Кому выдать)</label>
                <input type="text" id="input_owner_id" placeholder="Например: 1, 404-elf">
            </div>
            <div class="form-group">
                <label>Тема (Цвет)</label>
                <select id="input_theme">
                    <option value="flesh-theme">Плоть (Розовый)</option>
                    <option value="will-theme">Воля (Фиолетовый)</option>
                    <option value="method-theme">Метод (Синий)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Тип (Надзаголовок)</label>
                <input type="text" id="input_label" value="НАВЫК" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Название способности</label>
                <input type="text" id="input_title" placeholder="Например: Тяжелый удар" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Метка (Правый квадрат)</label>
                <input type="text" id="input_tag" placeholder="I, 2ОВ, 5+" oninput="updatePreview()">
            </div>
            <div class="form-group">
                <label>Описание (Механика)</label>
                <textarea id="input_description" placeholder="Используйте <b>текст</b> для жирного шрифта..." oninput="updatePreview()"></textarea>
            </div>
            <div class="form-group">
                <label>Тэги в подвале</label>
                <input type="text" id="input_footer" placeholder="Оружие, Контакт, Сила" oninput="updatePreview()">
            </div>
            
            <button type="submit" class="btn-submit" id="submit-btn">Выдать карточку</button>
            <div id="status-msg" style="color: #a5c6df; font-weight: bold; text-align: center; height: 20px;"></div>
        </form>

        <div class="preview-section">
            <label style="color: #a5c6df;">Предпросмотр карточки</label>
            <div class="card">
                <div class="card-frame">
                    <div class="card-header">
                        <div class="card-title-box">
                            <div class="card-label-display" id="prev_label">НАВЫК</div>
                            <div class="card-title-display" id="prev_title">Без названия</div>
                        </div>
                        <div class="card-tag-box"><div class="card-tag-display" id="prev_tag"></div></div>
                    </div>
                    <div class="card-body flesh-theme" id="prev_theme">
                        <div class="card-rich-text auto-resize-area" id="prev_desc" data-max-size="14"></div>
                    </div>
                    <div class="card-footer">
                        <div class="footer-label">ТЭГИ</div>
                        <div class="card-footer-tags-display auto-resize-tags" id="prev_footer" data-max-size="11"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="cards-list-container">
        <h1>Выданные карточки в игре</h1>
        <div class="cards-grid" id="existing-cards-grid">
            </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://fzfijdsjgxoympldpwyq.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6ZmlqZHNqZ3hveW1wbGRwd3lxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDY2NzAsImV4cCI6MjA5NDcyMjY3MH0.iAADzjFKSLEr1DHdQPq3j4Ji6tdh-NZhrTfIsvdxUgA'; 
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Функция точного авто-ресайза текста описания
        window.resizeCardText = function(area) {
            if(!area) return;
            let currentFS = parseInt(area.getAttribute('data-max-size')) || 14;
            const lhRatio = 1.7; 

            const update = (fs) => {
                area.style.fontSize = fs + 'px';
                area.style.setProperty('--lh', (fs * lhRatio) + 'px');
            };

            update(currentFS);
            while (area.scrollHeight > area.parentElement.clientHeight && currentFS > 8) {
                currentFS -= 0.5;
                update(currentFS);
            }
        };

        // Функция авто-ресайза тэгов
        window.resizeTagsText = function(el) {
            if (!el) return;
            let currentFS = parseInt(el.getAttribute('data-max-size')) || 11;
            el.style.fontSize = currentFS + 'px';
            
            while (el.scrollWidth > el.clientWidth && currentFS > 6) {
                currentFS -= 0.5;
                el.style.fontSize = currentFS + 'px';
            }
        };

        window.parseCardLinks = function(text) {
            if (!text) return '';
            return text.replace(/\[\[(.*?)\]\]/g, '<span class="card-link">$1</span>');
        }

        // Экранирование для безопасной вставки в HTML-атрибуты/текст
        function esc(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Поля содержимого карточки (всё, кроме id и owner_id)
        const CONTENT_FIELDS = ['theme', 'card_label', 'card_title', 'card_tag', 'card_description', 'card_footer_tags'];

        // Подпись карточки по содержимому — одинаковая подпись = «одна и та же карточка»
        function cardSignature(c) {
            return CONTENT_FIELDS.map(f => {
                let v = c[f] == null ? '' : String(c[f]);
                if (f === 'theme') v = v.trim();
                return v;
            }).join('\u0001');
        }

        // Живое обновление предпросмотра
        window.updatePreview = function() {
            document.getElementById('prev_label').innerText = document.getElementById('input_label').value || 'НАВЫК';
            document.getElementById('prev_title').innerText = document.getElementById('input_title').value || 'Без названия';
            document.getElementById('prev_tag').innerText = document.getElementById('input_tag').value;
            
            const descBox = document.getElementById('prev_desc');
            descBox.innerHTML = window.parseCardLinks(document.getElementById('input_description').value); 
            
            const footerEl = document.getElementById('prev_footer');
            footerEl.innerText = document.getElementById('input_footer').value;
            
            const theme = document.getElementById('input_theme').value;
            document.getElementById('prev_theme').className = `card-body ${theme}`;
            
            window.resizeCardText(descBox);
            window.resizeTagsText(footerEl);
        };
        
        document.getElementById('input_theme').addEventListener('change', window.updatePreview);

        // Состояние
        window.allGroups = [];          // сгруппированные карточки
        window.editingGroup = null;     // { ids: [...] } когда редактируем

        // Считываем содержимое из формы
        function readFormContent() {
            return {
                theme: document.getElementById('input_theme').value,
                card_label: document.getElementById('input_label').value,
                card_title: document.getElementById('input_title').value,
                card_tag: document.getElementById('input_tag').value,
                card_description: document.getElementById('input_description').value,
                card_footer_tags: document.getElementById('input_footer').value
            };
        }

        // Заполняем форму содержимым группы
        function fillFormFromContent(c) {
            const themeSelect = document.getElementById('input_theme');
            const theme = (c.theme || '').trim();
            const options = Array.from(themeSelect.options).map(o => o.value);
            if (options.includes(theme)) themeSelect.value = theme;

            document.getElementById('input_label').value = c.card_label || '';
            document.getElementById('input_title').value = c.card_title || '';
            document.getElementById('input_tag').value = c.card_tag || '';
            document.getElementById('input_description').value = c.card_description || '';
            document.getElementById('input_footer').value = c.card_footer_tags || '';
            window.updatePreview();
        }

        function setStatus(text, ok = true) {
            const s = document.getElementById('status-msg');
            s.style.color = ok ? '#a5c6df' : '#d4a3ae';
            s.innerText = text;
        }

        // Загрузка и группировка карточек
        async function fetchCards() {
            const { data: cards, error } = await supabase.from('cards').select('*').order('owner_id');
            const grid = document.getElementById('existing-cards-grid');
            grid.innerHTML = '';

            if (error) {
                grid.innerHTML = `<p style="color: red;">Ошибка загрузки базы: ${esc(error.message)}</p>`;
                return;
            }

            // Группируем по подписи содержимого
            const map = new Map();
            (cards || []).forEach(card => {
                const sig = cardSignature(card);
                if (!map.has(sig)) {
                    const group = { sig, owners: [] };
                    CONTENT_FIELDS.forEach(f => group[f] = card[f]);
                    map.set(sig, group);
                }
                map.get(sig).owners.push({ id: card.id, owner_id: card.owner_id });
            });

            window.allGroups = Array.from(map.values());
            // владельцев — по порядку для стабильности
            window.allGroups.forEach(g => g.owners.sort((a, b) =>
                String(a.owner_id).localeCompare(String(b.owner_id), 'ru', { numeric: true })
            ));

            if (window.allGroups.length === 0) {
                grid.innerHTML = '<p style="color:#8a807a;">Пока ни одной карточки не выдано.</p>';
                return;
            }

            window.allGroups.forEach((g, index) => {
                const safeTheme = g.theme ? g.theme.trim() : '';
                const isEditing = window.editingGroup &&
                    g.owners.some(o => window.editingGroup.ids.includes(o.id));

                const chips = g.owners.map(o => `
                    <span class="owner-chip">
                        ${esc(o.owner_id)}
                        <button title="Убрать у этого игрока" onclick="removeFromOwner('${esc(o.id)}')">&times;</button>
                    </span>`).join('');

                const html = `
                    <div class="mini-card-wrapper ${isEditing ? 'is-editing' : ''}">
                        <div class="owners-block">
                            <div class="owners-label">
                                <span>Выдано игрокам</span>
                                <span class="copies-count">${g.owners.length} коп.</span>
                            </div>
                            <div class="owners-row">${chips}</div>
                            <div class="add-owner-row">
                                <input type="text" id="add-owner-input-${index}" placeholder="ID игрока…">
                                <button onclick="addOwnerToGroup(${index})">+ Выдать</button>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-frame">
                                <div class="card-header">
                                    <div class="card-title-box">
                                        <div class="card-label-display">${esc(g.card_label || '')}</div>
                                        <div class="card-title-display">${esc(g.card_title || '')}</div>
                                    </div>
                                    <div class="card-tag-box"><div class="card-tag-display">${esc(g.card_tag || '')}</div></div>
                                </div>
                                <div class="card-body ${safeTheme}">
                                    <div class="card-rich-text auto-resize-area" data-max-size="14">${window.parseCardLinks(g.card_description || '')}</div>
                                </div>
                                <div class="card-footer">
                                    <div class="footer-label">ТЭГИ</div>
                                    <div class="card-footer-tags-display auto-resize-tags" data-max-size="11">${esc(g.card_footer_tags || '')}</div>
                                </div>
                            </div>
                        </div>
                        <div class="card-controls">
                            <button class="btn-edit" onclick="editGroup(${index})">✎ Редактировать у всех</button>
                            <button class="btn-copy" onclick="copyToForm(${index})">Взять как шаблон</button>
                            <button class="btn-delete" onclick="deleteGroup(${index})">Удалить у всех (${g.owners.length})</button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', html);
            });

            // Авторесайз для всех карточек в списке
            setTimeout(() => {
                grid.querySelectorAll('.auto-resize-area').forEach(el => window.resizeCardText(el));
                grid.querySelectorAll('.auto-resize-tags').forEach(el => window.resizeTagsText(el));
            }, 100);
        }

        // ВЗЯТЬ КАК ШАБЛОН (создать новую карточку на основе существующей)
        window.copyToForm = function(index) {
            cancelEdit();
            const g = window.allGroups[index];
            if (!g) return;
            fillFormFromContent(g);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setStatus('Содержимое перенесено в форму. Укажите игрока и выдайте.');
            setTimeout(() => setStatus(''), 3000);
        };

        // РЕДАКТИРОВАНИЕ группы (правит все копии у всех владельцев)
        window.editGroup = function(index) {
            const g = window.allGroups[index];
            if (!g) return;

            fillFormFromContent(g);
            window.editingGroup = { ids: g.owners.map(o => o.id) };

            const banner = document.getElementById('edit-banner');
            const ownersText = g.owners.map(o => o.owner_id).join(', ');
            document.getElementById('edit-banner-text').innerHTML =
                `<b>Режим редактирования.</b><br>Изменения применятся ко всем копиям (${g.owners.length}) у игроков: ${esc(ownersText)}.`;
            banner.classList.add('active');

            // Поле «кому выдать» при редактировании не нужно
            document.getElementById('owner-field-group').style.display = 'none';
            document.getElementById('submit-btn').innerText = `Сохранить изменения (${g.owners.length})`;

            window.scrollTo({ top: 0, behavior: 'smooth' });
            // подсветим карточку в списке
            fetchCards();
        };

        window.cancelEdit = function() {
            window.editingGroup = null;
            document.getElementById('edit-banner').classList.remove('active');
            document.getElementById('owner-field-group').style.display = '';
            document.getElementById('submit-btn').innerText = 'Выдать карточку';
        };

        // Дораздать карточку ещё одному игроку
        window.addOwnerToGroup = async function(index) {
            const g = window.allGroups[index];
            if (!g) return;
            const input = document.getElementById('add-owner-input-' + index);
            const owner = input.value.trim();
            if (!owner) { input.focus(); return; }

            const newCard = { owner_id: owner };
            CONTENT_FIELDS.forEach(f => newCard[f] = g[f]);

            const { error } = await supabase.from('cards').insert([newCard]);
            if (error) { setStatus(`Ошибка: ${error.message}`, false); }
            else { setStatus(`Выдано игроку ${owner}.`); setTimeout(() => setStatus(''), 3000); }
            fetchCards();
        };

        // Убрать карточку у одного игрока
        window.removeFromOwner = async function(rowId) {
            if (!confirm('Убрать эту карточку у данного игрока?')) return;
            const { error } = await supabase.from('cards').delete().eq('id', rowId);
            if (error) { setStatus(`Ошибка: ${error.message}`, false); }
            // если редактировали именно эту строку — обновим список ids
            if (window.editingGroup) {
                window.editingGroup.ids = window.editingGroup.ids.filter(id => id !== rowId);
                if (window.editingGroup.ids.length === 0) cancelEdit();
            }
            fetchCards();
        };

        // Удалить карточку у всех владельцев
        window.deleteGroup = async function(index) {
            const g = window.allGroups[index];
            if (!g) return;
            if (!confirm(`Удалить эту карточку у всех ${g.owners.length} игроков навсегда?`)) return;
            const ids = g.owners.map(o => o.id);
            const { error } = await supabase.from('cards').delete().in('id', ids);
            if (error) { setStatus(`Ошибка: ${error.message}`, false); }
            if (window.editingGroup && window.editingGroup.ids.some(id => ids.includes(id))) cancelEdit();
            fetchCards();
        };

        // Отправка формы: либо выдача новой, либо сохранение правок
        document.getElementById('add-card-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = readFormContent();

            if (!content.card_title.trim()) {
                setStatus('Укажите название способности.', false);
                return;
            }

            if (window.editingGroup) {
                // РЕЖИМ РЕДАКТИРОВАНИЯ — обновляем все копии
                setStatus('Сохранение…');
                const ids = window.editingGroup.ids;
                if (!ids.length) { cancelEdit(); return; }
                const { error } = await supabase.from('cards').update(content).in('id', ids);
                if (error) {
                    setStatus(`Ошибка: ${error.message}`, false);
                } else {
                    setStatus(`Сохранено для ${ids.length} игрок(ов).`);
                    setTimeout(() => setStatus(''), 3000);
                    cancelEdit();
                    fetchCards();
                }
            } else {
                // РЕЖИМ ВЫДАЧИ — создаём новую карточку
                const owner = document.getElementById('input_owner_id').value.trim();
                if (!owner) { setStatus('Укажите ID игрока.', false); return; }

                setStatus('Отправка…');
                const newCard = Object.assign({ owner_id: owner }, content);
                const { error } = await supabase.from('cards').insert([newCard]);

                if (error) {
                    setStatus(`Ошибка: ${error.message}`, false);
                } else {
                    setStatus('Успешно выдано игроку!');
                    setTimeout(() => setStatus(''), 3000);
                    document.getElementById('input_title').value = '';
                    document.getElementById('input_tag').value = '';
                    document.getElementById('input_description').value = '';
                    document.getElementById('input_footer').value = '';
                    window.updatePreview();
                    fetchCards();
                }
            }
        });

        // Инициализация
        fetchCards();
        window.updatePreview();
    </script>
</body>
</html>
